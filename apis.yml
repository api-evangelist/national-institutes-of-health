aid: national-institutes-of-health
name: National Institutes of Health
description: The National Institutes of Health (NIH), a part of the U.S. Department of Health and Human Services, is the nation's
  medical research agency making important discoveries that improve health and save lives. NIH operates the RePORTER API for
  exposing data about NIH-funded research projects and the publications associated with them.
