    description: The NIH RePORTER API provides programmatic access to NIH-funded research projects and their associated publications.
      The Projects endpoint accepts a rich criteria object including fiscal years, principal investigators, organizations, agencies,
      activity codes, and award amounts. The Publications endpoint accepts PubMed identifiers, application identifiers, and
      core project numbers.
